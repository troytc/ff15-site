<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>FF@15 — OG image</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#010A13;--surface-2:#0c1c2e;--fg:#F0E6D2;--muted:#A09B8C;--dim:#6A6B68;
    --gold:#C8AA6E;--gold-2:#C89B3C;--border-gold:#785A28;--line:#16273A;
    --blue:#0AC8B9;--blue-light:#CDFAFA;--red:#E84057;
    --fd:'Cinzel','Trajan Pro',Georgia,serif;
    --fb:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --fm:ui-monospace,'SF Mono',Menlo,monospace;
    --bevel:polygon(13px 0,100% 0,100% calc(100% - 13px),calc(100% - 13px) 100%,0 100%,0 13px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:var(--bg);color:var(--fg);font-family:var(--fb);font-variant-numeric:tabular-nums;
    -webkit-font-smoothing:antialiased;position:relative}

  /* ---- Rift at night scene ---- */
  .rift,.rift>*{position:absolute}
  .rift{inset:0;overflow:hidden}
  .sky{inset:0;background:
    radial-gradient(60% 70% at 86% -10%,rgba(200,155,60,.26),transparent 55%),
    radial-gradient(60% 60% at 82% 0%,rgba(16,92,84,.55),transparent 60%),
    radial-gradient(60% 70% at 4% 96%,rgba(44,38,92,.40),transparent 62%),
    linear-gradient(180deg,#02070e 0%,#01060c 56%,var(--bg) 100%)}
  .river{inset:-24% -12%;
    background:linear-gradient(116deg,transparent 40%,rgba(10,200,185,.10) 47%,rgba(205,250,250,.18) 50%,rgba(10,200,185,.10) 53%,transparent 60%);
    filter:blur(7px);mix-blend-mode:screen}
  .trees{bottom:0;left:0;width:100%;height:auto;display:block}
  .trees.far{opacity:.6}
  .trees.near{filter:drop-shadow(0 -1px 8px rgba(10,200,185,.12))}
  .fog{inset:-20%;filter:blur(34px);
    background:radial-gradient(38% 46% at 26% 44%,rgba(120,150,160,.07),transparent 70%),
      radial-gradient(46% 40% at 74% 60%,rgba(80,112,124,.06),transparent 70%)}
  .mote{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--gold);
    box-shadow:0 0 9px 1px rgba(200,170,110,.75)}
  .mote.t{background:var(--blue-light);box-shadow:0 0 9px 1px rgba(10,200,185,.75)}
  .vig{inset:0;background:
    radial-gradient(120% 100% at 30% 40%,transparent 30%,rgba(1,10,19,.5) 82%),
    linear-gradient(90deg,rgba(1,10,19,.62),transparent 52%)}

  /* ---- content ---- */
  .stage{position:absolute;inset:0;z-index:2;display:grid;grid-template-columns:1.18fr .82fr;
    align-items:center;gap:40px;padding:62px 70px}
  .logo{width:188px;height:63px;display:block;filter:drop-shadow(0 4px 16px rgba(200,170,110,.28))}
  .kicker{font-family:var(--fm);font-size:15px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--gold);margin:30px 0 18px}
  h1{font-family:var(--fd);font-weight:700;font-size:62px;line-height:1.05;letter-spacing:.01em}
  h1 .ff{color:var(--red);font-style:italic;white-space:nowrap}
  h1 .em{color:var(--gold);font-style:italic}
  .lede{color:var(--muted);font-size:21px;line-height:1.5;margin-top:24px;max-width:30ch}
  .lede b{color:var(--fg);font-weight:600}

  /* HUD card */
  .hex{background:linear-gradient(160deg,var(--border-gold),#2e2310 60%);clip-path:var(--bevel);padding:1px;
    box-shadow:0 30px 70px rgba(0,0,0,.5)}
  .hex-in{background:linear-gradient(165deg,var(--surface-2),#06121e);clip-path:var(--bevel);padding:22px 22px 20px}
  .hud-top{display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .hud-top .lg{width:62px;height:21px}
  .clock{margin-left:auto;display:inline-flex;align-items:center;gap:8px;font-family:var(--fm);
    font-size:20px;color:var(--fg);font-weight:600}
  .clock .live{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 10px 1px rgba(232,64,87,.8)}
  .pace{font-family:var(--fm);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:14px}
  .stat{display:grid;grid-template-columns:78px 1fr auto;align-items:center;gap:12px;padding:9px 0;border-top:1px solid rgba(22,39,58,.7)}
  .stat:first-of-type{border-top:0}
  .stat .lab{font-family:var(--fm);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .stat .val{font-family:var(--fm);font-size:19px;font-weight:600;text-align:right}
  .stat .spk{width:100%;height:26px;display:block}
  .ahead{color:var(--blue)} .onpace{color:var(--gold)} .behind{color:var(--red)}
  .verdict{margin-top:16px;padding:13px 16px;clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);
    background:rgba(10,200,185,.1);box-shadow:inset 0 0 0 1px rgba(10,200,185,.4);
    font-family:var(--fm);font-size:13px;letter-spacing:.06em;color:var(--blue-light);text-transform:uppercase;text-align:center}
  .verdict b{color:#fff}
</style>
</head>
